services:
  - type: web
    name: rezone-live-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SOCRATA_APP_TOKEN
        sync: false
      - key: TRANSITLAND_API_KEY
        sync: false

